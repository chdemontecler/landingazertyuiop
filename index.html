<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GreenDesk</title>
    <!-- One unique link to style.css -->
    <link rel="stylesheet" href="css/style.css">
  </head>
  <body>
 
    <!-- BANNER SECTION (hero) -->
    <div class="banner">
      <div class="container">
        <h1>Travaillez mieux, consommez moins</h1>
        <h2>GreenDesk vous connecte aux espaces de travail durables près de chez vous.</h2>
        <a href="" class="btn-blue">Réserver un espace</a>
      </div>
    </div>
 
    <!-- CARDS SECTION -->
    <div class="container">
      <div class="cards">
 
        <div class="card">
          <img src="images/bastille.jpg" alt="Bastille">
          <h3>Bastille</h3>
        </div>
 
        <div class="card">
          <img src="images/marais.jpg" alt="Marais">
          <h3>Marais</h3>
        </div>
 
        <div class="card">
          <img src="images/montmartre.jpg" alt="Montmartre">
          <h3>Montmartre</h3>
        </div>
 
        <div class="card">
          <img src="images/nation.jpg" alt="Nation">
          <h3>Nation</h3>
        </div>
 
        <div class="card">
          <img src="images/opera.jpg" alt="Opéra">
          <h3>Opéra</h3>
        </div>
 
      </div>
    </div>
 
    <!-- PROFILE SECTION -->
    <div class="container" style="padding-top: 60px; padding-bottom: 60px;">
      <h2>Notre équipe</h2>
      <p>Trois amis passionnés par l'écologie et le travail flexible.</p>
 
      <!-- Avatar example -->
      <img
        src="https://i.pravatar.cc/100"
        alt="Avatar"
        class="avatar avatar-large"
      >
    </div>
 
  </body>
</html>
